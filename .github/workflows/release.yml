name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm-pkg: kmd-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            npm-pkg: kmd-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: kmd-linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm-pkg: kmd-win32-x64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Build client
        run: |
          npm install
          bash build-client.sh

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p npm/${{ matrix.npm-pkg }}/bin
          cp target/${{ matrix.target }}/release/kmd \
             npm/${{ matrix.npm-pkg }}/bin/kmd
          chmod +x npm/${{ matrix.npm-pkg }}/bin/kmd

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm-pkg }}/bin
          cp target/${{ matrix.target }}/release/kmd.exe \
             npm/${{ matrix.npm-pkg }}/bin/kmd.exe

      - name: Verify version matches tag
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./npm/${{ matrix.npm-pkg }}/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      # Trusted publishing: uses OIDC for auth, no npm token needed.
      # Provenance is generated automatically.
      # Configure at: npmjs.com → package Settings → Trusted Publisher
      - name: Publish platform package
        working-directory: npm/${{ matrix.npm-pkg }}
        run: npm publish --access public --provenance

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm-pkg }}
          path: npm/${{ matrix.npm-pkg }}/bin/

  publish-meta:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for GitHub Release
      id-token: write  # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./npm/kmd/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      # Trusted publishing: uses OIDC for auth, no npm token needed.
      # Provenance is generated automatically.
      # Configure at: npmjs.com → package Settings → Trusted Publisher
      - name: Publish meta package
        working-directory: npm/kmd
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
